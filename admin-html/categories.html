<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>LeafLET — Class & Reviewer Management</title>

  <link rel="stylesheet" href="../sidebar/sidebar.css" />
  <link rel="stylesheet" href="../header/header.css" />
  <link rel="stylesheet" href="../admin-css/categories.css" />

  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet" />

  <style>
    /* ── Files panel inside reviewer modal ──────────────────────────── */
    .reviewer-card {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .reviewer-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 0;
      flex: 1;
      min-height: 0;
      border-top: 1px solid #e0e0d8;
    }

    /* Left: files list */
    .files-panel {
      border-right: 1px solid #e0e0d8;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .files-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-bottom: 1px solid #e0e0d8;
      background: #f9f9f5;
    }

    .files-panel-head span {
      font-size: 11px;
      font-weight: 700;
      color: #143d02;
    }

    .add-file-btn {
      height: 26px;
      padding: 0 10px;
      border: 0;
      border-radius: 7px;
      background: #497b1d;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
    }

    #filesList {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .files-empty {
      font-size: 11px;
      color: #65745f;
      text-align: center;
      padding: 18px 8px;
    }

    .file-item {
      border-radius: 9px;
      border: 1px solid #dde7cc;
      padding: 8px 10px;
      background: #fff;
      cursor: default;
    }

    .file-item.active {
      border-color: #497b1d;
      background: #eef4e6;
    }

    .file-item-info {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }

    .file-item-title {
      font-size: 12px;
      font-weight: 600;
      color: #143d02;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .file-badge {
      font-size: 9px;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: 999px;
      flex-shrink: 0;
    }

    .file-badge.published {
      background: #143d02;
      color: #fff;
    }

    .file-badge.draft {
      background: #e4e4df;
      color: #65745f;
    }

    .file-item-actions {
      display: flex;
      gap: 5px;
    }

    .danger-small {
      background: #fff0f0 !important;
      color: #c0392b !important;
      border: 1px solid #f5c6c6 !important;
    }

    /* Right: editor area */
    .editor-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .file-title-bar {
      padding: 10px 14px;
      border-bottom: 1px solid #e0e0d8;
      background: #fafaf7;
    }

    .file-title-bar input {
      width: 100%;
      border: 1px solid #dde7cc;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 13px;
      font-family: inherit;
      background: #fff;
      color: #143d02;
    }

    .import-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      border-bottom: 1px solid #e0e0d8;
      background: #fafaf7;
    }

    #reviewerEditor {
      flex: 1;
      overflow-y: auto;
    }

    #reviewerEditor .ql-container {
      font-family: inherit;
      font-size: 13px;
    }
  </style>
</head>

<body>

  <div id="sidebar-container"></div>

  <main class="main-content">

    <div id="header-container"></div>

    <section class="category-page">

      <div class="category-toolbar">
        <div>
          <p class="eyebrow">LET Reviewer</p>
          <h2>Class & Reviewer Management</h2>
        </div>

        <button type="button" class="primary-btn" id="createClassBtn">
          + Create Class
        </button>
      </div>

      <div class="category-layout">

        <aside class="category-sidebar">
          <div class="sidebar-title">Class Categories</div>

          <div id="categoryList" class="category-list">
            <p class="empty-text">Loading categories...</p>
          </div>
        </aside>

        <section class="class-panel">

          <div class="class-panel-head">
            <div>
              <p class="eyebrow">Selected Category</p>
              <h3 id="selectedCategoryName">Loading...</h3>
            </div>

            <p class="helper-text">
              Create classes, share class codes, and manage reviewer files for students.
            </p>
          </div>

          <div id="classGrid" class="class-grid">
            <p class="empty-text">Loading classes...</p>
          </div>

        </section>

      </div>

    </section>

  </main>

  <!-- Create class modal -->
  <div class="modal" id="classModal">
    <div class="modal-card">
      <h3>Create Class</h3>

      <label class="field">
        <span>Class Name</span>
        <input type="text" id="classNameInput" placeholder="Example: Gen Ed Review Class A">
      </label>

      <label class="field">
        <span>Category</span>
        <select id="classCategorySelect"></select>
      </label>

      <div class="modal-actions">
        <button type="button" class="secondary-btn" id="cancelClassBtn">Cancel</button>
        <button type="button" class="primary-btn" id="saveClassBtn">Save Class</button>
      </div>
    </div>
  </div>

  <!-- Reviewer / files modal -->
  <div class="modal reviewer-modal" id="reviewerModal">
    <div class="reviewer-card">

      <!-- Header -->
      <div class="reviewer-head">
        <div>
          <p class="eyebrow">Class Files</p>
          <h3 id="reviewerClassTitle">Class Reviewer</h3>
        </div>

        <button type="button" class="close-btn" id="closeReviewerBtn">×</button>
      </div>

      <!-- Two-column layout: files list + editor -->
      <div class="reviewer-layout">

        <!-- Left: files list -->
        <div class="files-panel">
          <div class="files-panel-head">
            <span>Files</span>
            <button type="button" class="add-file-btn" id="addFileBtn">+ Add File</button>
          </div>
          <div id="filesList"></div>
        </div>

        <!-- Right: editor -->
        <div class="editor-panel">

          <div class="file-title-bar">
            <input type="text" id="fileTitleInput" placeholder="File title…">
          </div>

          <div class="import-row">
            <label class="import-label">
              Import File
              <input type="file" id="importFileInput" accept=".txt,.html,.docx">
            </label>
            <small>Supports TXT, HTML, DOCX</small>
          </div>

          <div id="reviewerEditor"></div>

        </div>

      </div>

      <!-- Footer actions -->
      <div class="modal-actions" style="padding: 12px 16px; border-top: 1px solid #e0e0d8;">
        <button type="button" class="danger-btn"    id="deleteClassBtn">Delete Class</button>
        <button type="button" class="secondary-btn" id="copyClassCodeBtn">Copy Class Code</button>
        <button type="button" class="secondary-btn" id="saveReviewerBtn">Save Draft</button>
        <button type="button" class="primary-btn"   id="publishFileBtn">Publish</button>
      </div>

    </div>
  </div>

  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

  <script type="module" src="../sidebar/sidebar.js"></script>
  <script type="module" src="../header/header.js"></script>
  <script type="module" src="../admin-js/categories.js"></script>

</body>
</html>
