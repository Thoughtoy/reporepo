<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../admin-css/admin-login.css">
  <link rel="stylesheet" href="../flash/flash.css">
  <title>Admin Register</title>
</head>
<body>
  <main class="canvas">
    <div class="login-card">
      <div class="logo">
        <img src="../assets/images/LOGO.png" alt="LeafLET Logo">
      </div>

      <h1>Create Admin Account</h1>
      <p class="subtitle">Empower Instructors. Guide Learners</p>

      <form id="registerForm">
        <div class="input-group">
          <label>Full Name:</label>
          <input type="text" id="fullName" required>
        </div>

        <div class="input-group">
          <label>Email:</label>
          <input type="email" id="email" required>
        </div>

        <div class="input-group">
          <label>Password:</label>
          <div class="password-wrapper">
            <input type="password" id="password" required>
            <img src="images/hide.png" alt="Toggle Visibility" class="toggle-password">
          </div>
        </div>

        <div class="input-group">
          <label>Confirm Password:</label>
          <div class="password-wrapper">
            <input type="password" id="confirmPassword" required>
            <img src="images/hide.png" alt="Toggle Visibility" class="toggle-password">
          </div>
        </div>

        <button type="submit" id="registerBtn" class="btn-signin">Create Account</button>
        <button type="button" id="backToLoginBtn" class="btn-register">Back to Login</button>
      </form>
    </div>
  </main>

  <script type="module" src="../admin-js/register.js"></script>
</body>
</html>
