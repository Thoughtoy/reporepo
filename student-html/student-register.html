<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#143d02">

  <link rel="stylesheet" href="../student-css/student-auth.css">

  <title>LeafLET Register</title>
</head>
<body>

  <main class="auth-screen">
    <section class="auth-card">
      <img src="../assets/images/LOGO.png" class="logo" alt="LeafLET Logo">

      <h1>Welcome to LeafLET!</h1>
      <p>Join LeafLET and start your LET review today.</p>

      <form id="registerForm">
        <input type="text" id="fullName" class="input-box" placeholder="Enter full name" required>
        <input type="email" id="email" class="input-box" placeholder="Enter email address" required>

        <div class="password-wrap">
          <input type="password" id="password" class="input-box" placeholder="Create password" required>
          <button type="button" class="toggle-password" data-target="password">Show</button>
        </div>

        <div class="password-wrap">
          <input type="password" id="confirmPassword" class="input-box" placeholder="Confirm password" required>
          <button type="button" class="toggle-password" data-target="confirmPassword">Show</button>
        </div>

        <button type="submit" id="registerBtn" class="main-btn">Register</button>
      </form>

      <div class="text-link left">
        Already have an account?
        <a href="./student-login.html">Log in</a>
      </div>
    </section>
  </main>

  <script type="module" src="../student-js/student-register.js"></script>

</body>
</html>
