<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <link rel="manifest" href="../manifest.json">
  <meta name="theme-color" content="#143d02">

  <link rel="stylesheet" href="../student-css/student-auth.css">

  <title>LeafLET Reset Password</title>
</head>
<body>

  <main class="auth-screen">
    <section class="auth-card">
      <img src="../assets/images/LOGO.png" class="logo" alt="LeafLET Logo">

      <h1>Forgot your password?</h1>
      <p>Enter your email address to reset your password.</p>

      <form id="resetForm">
        <input type="email" id="email" class="input-box" placeholder="Enter your email address" required>

        <p class="note">
          If your email is registered, you will receive a reset password link.
        </p>

        <button type="submit" id="resetBtn" class="main-btn">Send reset link</button>
      </form>

      <div class="text-link left">
        Remember your password?
        <a href="./student-login.html">Back to login</a>
      </div>
    </section>
  </main>

  <script type="module" src="../student-js/forgot-password.js"></script>

</body>
</html>
